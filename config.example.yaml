# Omni-Writer AI - 全局配置模板
# 1. 复制此文件为 config.yaml
# 2. 填入你的真实 API Key
# 3. config.yaml 已在 .gitignore 中，不会被提交

llm_config:
  # 主 LLM API（兼容 OpenAI 接口的任何模型：DeepSeek、通义千问、智谱等）
  api_key: "sk-your-api-key-here"
  base_url: "https://api.deepseek.com/v1"

  # Embedding API（用于 RAG 检索）
  embedding_api_key: "sk-your-embedding-api-key"
  embedding_base_url: "https://api.openai.com/v1"
  embedding_model: "text-embedding-3-small"

  # 也可以通过环境变量设置（优先级高于此文件）：
  # export OMNI_WRITER_API_KEY="sk-xxx"
  # export OMNI_WRITER_BASE_URL="https://api.deepseek.com/v1"
  # export OMNI_WRITER_EMBEDDING_API_KEY="sk-xxx"

model_router:
  planner:
    model: "deepseek-chat"
    temperature: 0.7
  writer:
    model: "deepseek-chat"
    temperature: 0.85
  sanitizer:
    model: "deepseek-chat"
    temperature: 0.6
